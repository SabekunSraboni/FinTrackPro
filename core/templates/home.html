<!DOCTYPE html>
<html>
<head>
    <title>FinTrackpro - Home</title>
    <style>
        * { margin: 0; padding: 0; }
        body, html { height: 100%; font-family: 'Arial', sans-serif; }
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('https://images.unsplash.com/photo-1554224155-6726b3ff858f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            height: 100vh;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        h1 { font-size: 4rem; margin-bottom: 10px; font-weight: bold; }
        p { font-size: 1.2rem; margin-bottom: 30px; }
        .btn-start {
            padding: 15px 40px;
            background: #d81b60; /* ড্যাশবোর্ডের সাথে মিল রেখে পিঙ্ক থিম দিলাম */
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-start:hover {
            background: #ad1457;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>FinTrackpro</h1>
        <p>Smart Financial Tracking & Transaction System</p>
        <a href="{% url 'login' %}" class="btn-start">Get Started</a>
    </div>
</body>
</html>
